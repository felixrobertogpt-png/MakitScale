spring.application.name=makitscale

# ===========================
# PostgreSQL Connection (Docker)
# ===========================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:makitscale_db}
spring.datasource.username=${DB_USER:erp_admin}
spring.datasource.password=${DB_PASSWORD:erp_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Buena práctica: evita Lazy Loading accidental fuera de la transacción.
spring.jpa.open-in-view=false

# ===========================
# Connection Pool (HikariCP)
# ===========================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===========================
# Server
# ===========================
server.port=${SERVER_PORT:8080}

# ===========================
# Logging (producción)
# ===========================
logging.level.com.makeitcl.makitscale=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
